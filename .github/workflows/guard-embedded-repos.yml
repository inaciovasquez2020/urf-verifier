name: "Guard: forbid embedded git repos"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  forbid-embedded-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}
      - name: Fail if embedded .git directories exist
        run: |
          set -euo pipefail
          if find . -path '*/.git' -type d | grep -v '^./.git$'; then
            echo "ERROR: Embedded git repository detected."
            exit 1
          fi
