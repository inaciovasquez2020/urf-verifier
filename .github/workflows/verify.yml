name: verify

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Manual URF core verification (experimental)"

      - name: Verifier invariant guards
