name: verifier-check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  invariant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify verifier structure
        run: |
          test -f lean-toolchain
          test -d Verifier || test -d src || true
          echo "OK: verifier repository structure verified"
  workflow_dispatch:
